stages:
  - setup
  - test

variables:
  PYTHONUNBUFFERED: "1"

# Template om de omgeving voor te bereiden
.test_setup:
  image: python:3.9-slim
  before_script:
    - pip install PyYAML cryptography pydantic
    - mkdir -p tests/certs/prod
    # Genereer dummy certificaten
    - openssl req -x509 -newkey rsa:2048 -keyout tests/certs/prod/root.key -out tests/certs/prod/root.crt -days 365 -nodes -subj "/CN=Test Root CA"
    - openssl req -newkey rsa:2048 -keyout tests/certs/prod/server.key -out tests/certs/prod/server.crt -nodes -subj "/CN=Test Server"
    # Genereer de test configuratie
    - |
      cat <<EOF > tests/test_config.yaml
      env: "prod"
      certificate_file_extension: ".crt"
      truststores:
        - cert_src_dir: "tests/certs/{{ env }}/"
          cert_chain:
            - link: "root"
            - link: "server"
      EOF

# Test scenario 1: Healthy Chain
test_healthy_chain:
  extends: .test_setup
  stage: test
  script:
    - echo "Running healthy chain test..."
    - python3 check_truststore tests/test_config.yaml --format text

# Test scenario 2: Missing Files
test_missing_files:
  extends: .test_setup
  stage: test
  script:
    - echo "Running missing file test..."
    - rm tests/certs/prod/server.crt
    - python3 check_truststore tests/test_config.yaml --format text --debug 2>&1 | grep "READ_ERROR"
  allow_failure: true

# Test scenario 3: JSON Output Validation
test_json_output:
  extends: .test_setup
  stage: test
  script:
    - echo "Validating JSON structure..."
    - python3 check_truststore tests/test_config.yaml --format json > output.json
    - python3 -m json.tool output.json

# Test scenario 4: Collision Detection
test_collision:
  extends: .test_setup
  stage: test
  script:
    - echo "Generating collision..."
    - openssl req -x509 -newkey rsa:2048 -keyout tests/certs/prod/root_alt.key -out tests/certs/prod/root_alt.crt -days 365 -nodes -subj "/CN=Test Root CA"
    - echo "    - link: \"root_alt\"" >> tests/test_config.yaml
    - python3 check_truststore tests/test_config.yaml --format text --debug 2>&1 | grep "COLLISION"