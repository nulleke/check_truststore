stages:
  - test

variables:
  PYTHONUNBUFFERED: "1"

test_full_compatibility:
  stage: test
  image: python:${PYTHON_VERSION}-slim
  parallel:
    matrix:
      - PYTHON_VERSION: ["3.6", "3.7", "3.8", "3.9", "3.10", "3.11", "3.12", "3.13", "3.14-rc"]
  before_script:
    # Voor Python 3.6 moeten we soms pip upgraden voor moderne cryptography libraries
    - python3 -m pip install --upgrade pip
    - pip install PyYAML cryptography pydantic
  
  script:
    - echo "Testing on Python ${PYTHON_VERSION} against TST environment files"
    - python3 check_truststore vars/tst/stores.yml --format text -d
    - python3 check_truststore vars/tst/stores.yml --format json > output.json
    - python3 -m json.tool output.json

test_no_pydantic_fallback:
  stage: test
  image: python:3.6-slim
  before_script:
    - python3 -m pip install --upgrade pip
    - pip install PyYAML cryptography
  script:
    - echo "Testing Fallback-mode (No Pydantic) on Python 3.6"
    - python3 check_truststore vars/tst/stores.yml --format text -d
    - python3 check_truststore vars/tst/stores.yml --format json > output_fallback.json
    - python3 -m json.tool output_fallback.json